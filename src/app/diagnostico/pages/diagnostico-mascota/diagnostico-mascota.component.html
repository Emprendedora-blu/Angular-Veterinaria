<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">
    <i class="bi bi-clipboard2-pulse me-2"></i>
    Diagnóstico — {{ mascota?.nombre ?? 'Mascota' }}
    <span *ngIf="mascota" class="badge bg-secondary align-middle">{{ mascota.codigo }}</span>
  </h2>
  <a class="btn btn-outline-secondary" routerLink="/diagnostico">
    <i class="bi bi-arrow-left"></i> Volver
  </a>
</div>

<div class="card" style="max-width: 480px;">
  <div class="card-header"><i class="bi bi-plus-circle me-2"></i>Nueva atención</div>
  <form [formGroup]="form" (ngSubmit)="agregar()" class="card-body">
    <div class="mb-2">
      <label class="form-label">Fecha</label>
      <input type="date" class="form-control" formControlName="fecha"
        [class.is-invalid]="f['fecha'].invalid && f['fecha'].touched" />
    </div>
    <div class="mb-2">
      <label class="form-label">Diagnóstico</label>
      <input class="form-control" formControlName="diagnostico"
        [class.is-invalid]="f['diagnostico'].invalid && f['diagnostico'].touched" />
    </div>
    <div class="mb-2">
      <label class="form-label">Tratamiento</label>
      <textarea class="form-control" rows="2" formControlName="tratamiento"
        [class.is-invalid]="f['tratamiento'].invalid && f['tratamiento'].touched"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Veterinario</label>
      <select class="form-select" formControlName="veterinario"
        [class.is-invalid]="f['veterinario'].invalid && f['veterinario'].touched">
        <option value="">Selecciona…</option>
        <option *ngFor="let v of veterinarios$ | async" [value]="v.nombre">
          {{ v.nombre }} ({{ v.horaInicio }}–{{ v.horaFin }})
        </option>
      </select>
      <div class="invalid-feedback">Selecciona un veterinario.</div>
    </div>
    <button class="btn btn-primary w-100" type="submit">
      <i class="bi bi-save me-1"></i>Registrar
    </button>
  </form>
</div>

<div *ngIf="guardado" class="alert alert-success mt-3">
  <i class="bi bi-check-circle me-1"></i>Atención registrada. Ya se refleja en el
  <a [routerLink]="['/historial', mascotaId]">historial de {{ mascota?.nombre }}</a>.
</div>
