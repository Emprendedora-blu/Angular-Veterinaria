<h2 class="mb-3">
  <i class="bi bi-calendar-plus me-2"></i>
  {{ editandoId ? 'Editar cita' : 'Nueva cita' }}
</h2>

<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="card">
  <div class="card-body row g-3">
    <div class="col-md-6">
      <label class="form-label">Mascota</label>
      <select class="form-select" formControlName="mascotaId"
        [class.is-invalid]="f['mascotaId'].invalid && f['mascotaId'].touched">
        <option value="">Selecciona…</option>
        <option *ngFor="let m of mascotas$ | async" [value]="m.id">{{ m.nombre }} ({{ m.especie === 'otro' && m.especieOtra ? m.especieOtra : m.especie }})</option>
      </select>
      <div class="invalid-feedback">Selecciona una mascota.</div>
    </div>

    <div class="col-md-6">
      <label class="form-label">Fecha y hora</label>
      <input type="hidden" formControlName="fecha" />
      <div class="row g-2">
        <div class="col-12">
          <input type="date" class="form-control"
            [class.is-invalid]="f['fecha'].invalid && f['fecha'].touched"
            [min]="minDate"
            [value]="fechaDate"
            (change)="fechaDate = $any($event.target).value; actualizarFecha()" />
        </div>
        <div class="col-4">
          <input type="number" class="form-control text-center px-1"
            [class.is-invalid]="f['fecha'].invalid && f['fecha'].touched"
            min="1" max="12" placeholder="H"
            [value]="fechaHora"
            (change)="fechaHora = $any($event.target).value; actualizarFecha()" />
        </div>
        <div class="col-4">
          <div class="input-group">
            <span class="input-group-text px-2">:</span>
            <input type="number" class="form-control text-center px-1"
              [class.is-invalid]="f['fecha'].invalid && f['fecha'].touched"
              min="0" max="59" placeholder="00"
              [value]="+fechaMinuto"
              (change)="fechaMinuto = $any($event.target).value.toString().padStart(2,'0'); actualizarFecha()" />
          </div>
        </div>
        <div class="col-4">
          <select class="form-select"
            [class.is-invalid]="f['fecha'].invalid && f['fecha'].touched"
            [value]="fechaAmPm"
            (change)="fechaAmPm = $any($event.target).value; actualizarFecha()">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
        </div>
      </div>
      <div class="form-text text-muted">
        <i class="bi bi-clock me-1"></i>Atención: <strong>Lun–Vie · 8:00 AM – 8:00 PM</strong>
      </div>
      <div *ngIf="f['fecha'].invalid && f['fecha'].touched" class="text-danger small mt-1">
        <span *ngIf="f['fecha'].errors?.['required']">Fecha requerida.</span>
        <span *ngIf="f['fecha'].errors?.['pasada']">La fecha no puede ser en el pasado.</span>
        <span *ngIf="f['fecha'].errors?.['fueraDia']">Solo atendemos de Lunes a Viernes.</span>
        <span *ngIf="f['fecha'].errors?.['fueraHorario']">El horario de atención es de 8:00 AM a 8:00 PM.</span>
      </div>
    </div>

    <div class="col-md-8">
      <label class="form-label">Motivo</label>
      <input class="form-control" formControlName="motivo"
        [class.is-invalid]="f['motivo'].invalid && f['motivo'].touched" />
    </div>
    <div class="col-md-4">
      <label class="form-label">Veterinario</label>
      <select class="form-select" formControlName="veterinario"
        [class.is-invalid]="f['veterinario'].invalid && f['veterinario'].touched">
        <option value="">Selecciona…</option>
        <option *ngFor="let v of veterinarios$ | async" [value]="v.nombre">
          {{ v.nombre }} ({{ v.horaInicio }}–{{ v.horaFin }})
        </option>
      </select>
      <div class="form-text text-muted">Lun – Vie</div>
      <div class="invalid-feedback">Selecciona un veterinario.</div>
    </div>
    <div class="col-md-4">
      <label class="form-label">Estado</label>
      <select class="form-select" formControlName="estado">
        <option value="pendiente">Pendiente</option>
        <option value="confirmada">Confirmada</option>
        <option value="atendida">Atendida</option>
        <option value="cancelada">Cancelada</option>
      </select>
    </div>
    <div class="col-12">
      <label class="form-label">Notas</label>
      <textarea class="form-control" rows="2" formControlName="notas"></textarea>
    </div>
  </div>
  <div class="card-footer d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-save me-1"></i>Guardar
    </button>
    <a class="btn btn-outline-secondary" routerLink="/citas">Cancelar</a>
  </div>
</form>
