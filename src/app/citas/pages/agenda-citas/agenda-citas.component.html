<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0"><i class="bi bi-calendar-check me-2"></i>Agenda de citas</h2>
  <a class="btn btn-primary" routerLink="/citas/nueva">
    <i class="bi bi-plus-lg me-1"></i>Nueva cita
  </a>
</div>

<div class="btn-group mb-3" role="group">
  <button class="btn btn-outline-secondary" [class.active]="filtro==='todas'" (click)="filtro='todas'">Todas</button>
  <button class="btn btn-outline-secondary" [class.active]="filtro==='pendiente'" (click)="filtro='pendiente'">Pendientes</button>
  <button class="btn btn-outline-secondary" [class.active]="filtro==='confirmada'" (click)="filtro='confirmada'">Confirmadas</button>
  <button class="btn btn-outline-secondary" [class.active]="filtro==='atendida'" (click)="filtro='atendida'">Atendidas</button>
  <button class="btn btn-outline-secondary" [class.active]="filtro==='cancelada'" (click)="filtro='cancelada'">Canceladas</button>
</div>

<ng-container *ngIf="(citas$ | async) as citas">
  <div *ngIf="citas.length === 0" class="alert alert-info">No hay citas registradas.</div>

  <div class="table-responsive" *ngIf="citas.length">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>Fecha y hora</th>
          <th>Mascota</th>
          <th>Motivo</th>
          <th>Veterinario</th>
          <th>Estado</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngFor="let c of citas">
          <tr *ngIf="visible(c)" [appResaltarCita]="c.fecha" [umbralHoras]="24">
            <td>{{ c.fecha | date:'medium' }}</td>
            <td>{{ c.mascotaNombre }}</td>
            <td>{{ c.motivo }}</td>
            <td>{{ c.veterinario }}</td>
            <td [innerHTML]="c.estado | estadoCita"></td>
            <td class="text-end">
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-success" title="Confirmar"
                  (click)="cambiarEstado(c, 'confirmada')"><i class="bi bi-check2"></i></button>
                <button class="btn btn-outline-primary" title="Atendida"
                  (click)="cambiarEstado(c, 'atendida')"><i class="bi bi-check2-all"></i></button>
                <button class="btn btn-outline-warning" title="Cancelar"
                  (click)="cambiarEstado(c, 'cancelada')"><i class="bi bi-x-lg"></i></button>
                <a class="btn btn-outline-secondary" [routerLink]="['/citas', c.id, 'editar']"
                  title="Editar"><i class="bi bi-pencil"></i></a>
                <button class="btn btn-outline-danger" (click)="eliminar(c)"
                  title="Eliminar"><i class="bi bi-trash"></i></button>
              </div>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</ng-container>
