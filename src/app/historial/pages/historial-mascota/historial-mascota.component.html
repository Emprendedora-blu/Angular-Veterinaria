<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">
    <i class="bi bi-journal-medical me-2"></i>
    Historial — {{ mascota?.nombre ?? 'Mascota' }}
    <span *ngIf="mascota" class="badge bg-secondary align-middle">{{ mascota.codigo }}</span>
  </h2>
  <a class="btn btn-outline-secondary" routerLink="/historial">
    <i class="bi bi-arrow-left"></i> Volver
  </a>
</div>

<div *ngIf="entradas.length === 0" class="alert alert-info">
  Aún no hay entradas en el historial.
</div>
<div class="timeline">
  <div class="card mb-2" *ngFor="let e of entradas">
    <div class="card-body">
      <div class="d-flex justify-content-between">
        <h6 class="mb-1">{{ e.diagnostico }}</h6>
        <small class="text-muted">{{ e.fecha | date:'longDate' }}</small>
      </div>
      <p class="mb-1"><strong>Tratamiento:</strong> {{ e.tratamiento }}</p>
      <small class="text-muted">Atendido por {{ e.veterinario }}</small>
      <button class="btn btn-sm btn-outline-danger float-end" (click)="eliminar(e)">
        <i class="bi bi-trash"></i>
      </button>
    </div>
  </div>
</div>
