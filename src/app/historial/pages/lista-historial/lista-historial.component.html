<h2 class="mb-3"><i class="bi bi-journal-medical me-2"></i>Historial de atención</h2>
<p class="text-muted">Selecciona una mascota para ver su historial.</p>

<div class="list-group">
  <a *ngFor="let m of mascotas$ | async"
     class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
     [routerLink]="['/historial', m.id]">
    <div>
      <strong>{{ m.nombre }}</strong>
      <span class="text-muted ms-2 small">{{ m.especie }} · {{ m.raza }}</span>
    </div>
    <i class="bi bi-chevron-right"></i>
  </a>
</div>
