<h2 class="mb-3"><i class="bi bi-journal-medical me-2"></i>Historial de atención</h2>
<p class="text-muted">Selecciona una mascota para ver su historial.</p>

<div class="input-group mb-3">
  <span class="input-group-text"><i class="bi bi-search"></i></span>
  <input
    type="text"
    class="form-control"
    placeholder="Buscar por nombre, código, especie o raza..."
    [ngModel]="busqueda$ | async"
    (ngModelChange)="buscar($event)"
  />
</div>

<ng-container *ngIf="(mascotasFiltradas$ | async) as mascotas">
  <div class="list-group">
    <a *ngFor="let m of mascotas"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
       [routerLink]="['/historial', m.id]">
      <div>
        <span class="badge bg-light text-dark border me-2">{{ m.codigo }}</span>
        <strong>{{ m.nombre }}</strong>
        <span class="text-muted ms-2 small">{{ m.especie === 'otro' && m.especieOtra ? m.especieOtra : m.especie }} · {{ m.raza }}</span>
      </div>
      <i class="bi bi-chevron-right"></i>
    </a>
  </div>

  <div *ngIf="mascotas.length === 0" class="alert alert-info">
    No se encontraron mascotas que coincidan con la búsqueda.
  </div>
</ng-container>
