<h2 class="mb-3">
  <i class="bi bi-piggy-bank me-2"></i>
  {{ editandoId ? 'Editar mascota' : 'Nueva mascota' }}
</h2>

<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-person me-2"></i>Dueño</span>
      <button type="button" class="btn btn-sm btn-outline-primary" (click)="toggleNuevoDueno()">
        {{ crearNuevoDueno ? 'Seleccionar existente' : 'Registrar nuevo dueño' }}
      </button>
    </div>
    <div class="card-body">
      <div *ngIf="!crearNuevoDueno">
        <label class="form-label">Dueño</label>
        <select class="form-select" formControlName="duenoId"
          [class.is-invalid]="f['duenoId'].invalid && f['duenoId'].touched">
          <option value="">Selecciona un dueño…</option>
          <option *ngFor="let d of duenos" [value]="d.id">
            {{ d.nombre }} {{ d.apellido }} — {{ d.telefono }}
          </option>
        </select>
        <div class="invalid-feedback">Selecciona un dueño.</div>
      </div>

      <div *ngIf="crearNuevoDueno" [formGroup]="duenoForm" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input class="form-control" formControlName="nombre"
            [class.is-invalid]="fd['nombre'].invalid && fd['nombre'].touched" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Apellido</label>
          <input class="form-control" formControlName="apellido"
            [class.is-invalid]="fd['apellido'].invalid && fd['apellido'].touched" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Teléfono</label>
          <input class="form-control" formControlName="telefono"
            [class.is-invalid]="fd['telefono'].invalid && fd['telefono'].touched" />
          <div class="invalid-feedback">Solo dígitos (6-15).</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input class="form-control" formControlName="email"
            [class.is-invalid]="fd['email'].invalid && fd['email'].touched" />
        </div>
        <div class="col-12">
          <label class="form-label">Dirección</label>
          <input class="form-control" formControlName="direccion" />
        </div>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-header"><i class="bi bi-piggy-bank me-2"></i>Datos de la mascota</div>
    <div class="card-body row g-3">
      <div class="col-md-6">
        <label class="form-label">Nombre</label>
        <input class="form-control" formControlName="nombre"
          [class.is-invalid]="f['nombre'].invalid && f['nombre'].touched" />
        <div class="invalid-feedback">Nombre requerido (mín. 2 caracteres).</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Especie</label>
        <select class="form-select" formControlName="especie">
          <option value="perro">Perro</option>
          <option value="gato">Gato</option>
          <option value="ave">Ave</option>
          <option value="roedor">Roedor</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Sexo</label>
        <select class="form-select" formControlName="sexo">
          <option value="macho">Macho</option>
          <option value="hembra">Hembra</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Raza</label>
        <input class="form-control" formControlName="raza"
          [class.is-invalid]="f['raza'].invalid && f['raza'].touched" />
      </div>
      <div class="col-md-3">
        <label class="form-label">Fecha de nacimiento</label>
        <input type="date" class="form-control" formControlName="fechaNacimiento"
          [class.is-invalid]="f['fechaNacimiento'].invalid && f['fechaNacimiento'].touched" />
      </div>
      <div class="col-md-3">
        <label class="form-label">Peso (kg)</label>
        <input type="number" step="0.1" class="form-control" formControlName="peso" />
      </div>
      <div class="col-12">
        <label class="form-label">Notas</label>
        <textarea class="form-control" rows="2" formControlName="notas"></textarea>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-save me-1"></i>Guardar
    </button>
    <a class="btn btn-outline-secondary" routerLink="/mascotas">Cancelar</a>
  </div>
</form>
